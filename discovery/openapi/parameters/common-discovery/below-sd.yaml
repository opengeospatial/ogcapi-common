---
name: below-sd
in: query
description: |-
  The `below-sd` parameter allows searching for collections usable at the scale denominator specified, allowing to filter out
  low-resolution datasets not suitable for the intended purpose. The related property indicating the minimum suitable scale denominator
  in the collection description is minScaleDenominator, which may also be related to a minCellSize property for gridded coverages.
  For example, `below-sd=200000` would only match collections with data intended for a scale of 1:200,000 or larger
  (i.e., collections intended for 1:2,000,000 would be excluded).
required: false
schema:
  type: number
explode: false
style: form
