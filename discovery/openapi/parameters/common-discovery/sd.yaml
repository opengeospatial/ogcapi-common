---
name: sd
in: query
description: |-
  The `sd` parameter allows searching for collections usable anywhere within the scale denominator range specified, allowing, for example, to filter out
  low-resolution (large minimum cell size) collections or overly detailed collections not suitable for the intended purpose.
  The related properties indicating the minimum and maximum suitable scale
  denominator in the collection description are `minScaleDenominator` and `maxScaleDenominator`,
  as well as the `minCellSize` and `maxCellSize` properties for gridded coverages related via a 0.28 mm/cell assumption.
  An empty string or two dots (`..`) can be used on either side of the slash to indicate a half-bounded or unbounded interval.
  A single value without a slash (e.g., `sd=200000`) is interpreted as a target scale denominator (`200000/200000`) and evaluates against both minimum and maximum scale boundaries.
  For example, `sd=/200000` would only match collections with data intended for a scale of 1:200,000 or larger
  (e.g., collections intended for 1:2,000,000 would be excluded).
  Accepting two ranges (logical AND combination) allows to search for collections that fully support an entire range of scales
  (e.g., `sd=5000,50000`, or equivalently `sd=5000/5000,50000/50000`, or `sd=/5000,50000/`).
required: false
schema:
  type: array
  items:
    type: string
    pattern: '^(?:[0-9]+(?:\.[0-9]+)?|\.\.)?/(?:[0-9]+(?:\.[0-9]+)?|\.\.)?$|^[0-9]+(?:\.[0-9]+)?$'
  minItems: 1
  maxItems: 2
  example: [ "../200000" ]
explode: false
style: form
